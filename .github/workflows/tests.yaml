name: tests

on:
  pull_request:
    branches:
      - master

jobs:
  pytests:

    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --group tests

      - name: Run tests in tests/
        run: uv run pytest tests/ || true

      - name: Run tests embedded in docstrings
        run: uv run pytest --doctest-modules django_diagnostic/ || true
